name: CI

on:
  push:
  pull_request:

# CI only reads the repo; never grant the default token more.
permissions:
  contents: read

jobs:
  shell:
    name: shellcheck + shell integration tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install shellcheck and rsync
        run: sudo apt-get update && sudo apt-get install -y shellcheck rsync
      - name: bash syntax check
        run: |
          for f in install.sh scripts/*.sh tests/*.sh tests/shell/*.sh; do
            bash -n "$f"
          done
      - name: shellcheck
        run: shellcheck install.sh scripts/*.sh tests/*.sh tests/shell/*.sh
      - name: secret scan
        run: bash tests/secret_scan.sh
      - name: shell integration tests (dry-run safety contract + installer)
        run: |
          for t in tests/shell/test_*.sh; do
            bash "$t"
          done

  python:
    name: pytest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install pytest
        run: python -m pip install pytest
      - name: Compile check
        run: python -m py_compile scripts/cold_storage_scan.py
      - name: Unit tests (all API calls mocked)
        run: python -m pytest tests/ -v
